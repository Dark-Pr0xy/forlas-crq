name: Feature request
description: Suggest an idea or improvement
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What are you trying to do, and what's getting in the way?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: checkboxes
    id: principles
    attributes:
      label: Design principles
      description: FORLAS CRQ is local-first and offline by design.
      options:
        - label: My idea keeps the app local-first, offline, and free of telemetry/cloud/external calls (or I've explained why an exception is warranted).
          required: true
