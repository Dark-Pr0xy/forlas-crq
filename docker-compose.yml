services:
  forlas-crq:
    build: .
    image: forlas-crq:latest
    container_name: forlas-crq
    restart: unless-stopped
    ports:
      - "8765:8765"
    volumes:
      - forlas_data:/data
    environment:
      FORLAS_DATA_DIR: /data
      FORLAS_HOST: 0.0.0.0
      FORLAS_PORT: "8765"
      # Set this on first run to seed a known owner password:
      # FORLAS_BOOTSTRAP_OWNER_PASSWORD: ChangeMe!Strong1
      FORLAS_CORS_ORIGINS: '["http://localhost:8765"]'

volumes:
  forlas_data:
